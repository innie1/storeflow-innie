<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Premium Dark Rounded Square Background -->
  <rect width="512" height="512" rx="128" fill="#070b19" />
  
  <g transform="translate(15, 0)">
    <!-- Speed Lines Group (Amber/Gold color matching the image) -->
    <g fill="#FFB81C">
      <!-- Speed Line 1 (top) -->
      <rect x="75" y="200" width="75" height="13" rx="6.5" />
      <!-- Speed Line 2 -->
      <rect x="52" y="222" width="100" height="13" rx="6.5" />
      <!-- Speed Line 3 (merges into S) -->
      <rect x="68" y="244" width="125" height="13" rx="6.5" />
      <!-- Speed Line 4 (bottom) -->
      <rect x="85" y="266" width="65" height="13" rx="6.5" />
    </g>

    <!-- SF Text (Styled with system fonts, italic, extra bold) -->
    <text x="290" y="305" 
          font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
          font-weight="900" 
          font-style="italic" 
          font-size="205" 
          fill="#ffffff" 
          text-anchor="middle"
          letter-spacing="-10">SF</text>
  </g>

  <!-- StoreFlow Text below -->
  <text x="256" y="395" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-weight="700" 
        font-size="52" 
        text-anchor="middle"
        letter-spacing="-1">
    <tspan fill="#ffffff">Store</tspan><tspan fill="#FFB81C">Flow</tspan>
  </text>
</svg>
