<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      .logo-text {
        font-family: 'Plus Jakarta Sans', 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
        font-weight: 900;
        font-style: italic;
      }
      .brand-text {
        font-family: 'Plus Jakarta Sans', 'Inter', 'Outfit', system-ui, -apple-system, sans-serif;
        font-weight: 800;
      }
    </style>
  </defs>
  
  <!-- Transparent background by default, content centered -->
  <g transform="translate(10, -10)">
    <!-- Yellow Motion/Speed Lines (Background Layer) -->
    <g fill="#FFB700">
      <!-- 4 speed lines aligned with the S curve -->
      <rect x="75" y="192" width="90" height="12" rx="6" />
      <rect x="50" y="214" width="125" height="12" rx="6" />
      <rect x="68" y="236" width="115" height="12" rx="6" />
      <rect x="98" y="258" width="80" height="12" rx="6" />
      
      <!-- Subtle wedge that fills the gap inside the S hook -->
      <path d="M 145,192 C 165,192 185,210 185,235 C 185,255 165,270 145,270 Z" opacity="0.9" />
    </g>

    <!-- SF letters group with skew/slant -->
    <g transform="translate(255, 260) skewX(-12)">
      <!-- Dark Blue Backdrop/Shadow -->
      <text x="6" y="6" font-size="145" text-anchor="middle" fill="#0E131F" stroke="#0E131F" stroke-width="14" stroke-linejoin="round" class="logo-text">SF</text>
      
      <!-- White Front Letters with Dark Blue Outline -->
      <text x="0" y="0" font-size="145" text-anchor="middle" fill="#FFFFFF" stroke="#0E131F" stroke-width="5" stroke-linejoin="round" class="logo-text">SF</text>
    </g>

    <!-- StoreFlow Brand Text -->
    <g transform="translate(250, 375)" text-anchor="middle" class="brand-text">
      <text font-size="56" letter-spacing="-1">
        <tspan fill="#0E131F">Store</tspan>
        <tspan fill="#FFB700">Flow</tspan>
      </text>
    </g>
  </g>
</svg>
